# Block-type catalog (Step 4 of the content-pipeline rebuild; XKDeco block_types sheet,
# transitional YAML form — moves into mirage.xlsx in step 5).
#
# A "block type" is a SHAPE recipe, independent of any family's material/colour. Families
# no longer list their shapes; content/apply.yaml assigns block_types to families and the
# generator expands family (material × colour-axes) × block_type into concrete blocks.
#
# kind:    common  -> regular generated geometry (cube/slab/stairs/wall/pane/grille/slope/...)
#          special -> kit-driven; geometry is hand-authored & FROZEN under src/main
#                     (the generator emits only data: catalog/loot/lang/tags/item-definition).
# produce: geom | special  (mirror of `kind`; the xlsx column is `produce`).
# suffix/zh/en: block-id suffix + display-name fragments (common shapes).
# kit:     default special kit (static/pole/...); an apply cell may override it.
# zh/en:   fallback display-name fragments for special shapes (an apply cell may override).
#
# This catalog is cross-validated at load against the generator's shape/name tables, so it
# cannot silently drift from them.

common:
- {id: cube,          produce: geom, suffix: "",               zh: "",     en: ""}
- {id: slab,          produce: geom, suffix: _slab,            zh: 半砖,   en: " Slab"}
- {id: stairs,        produce: geom, suffix: _stairs,          zh: 楼梯,   en: " Stairs"}
- {id: wall,          produce: geom, suffix: _wall,            zh: 墙,     en: " Wall"}
- {id: pane,          produce: geom, suffix: _pane,            zh: 窗格,   en: " Pane"}
- {id: grille,        produce: geom, suffix: "",               zh: "",     en: ""}
- {id: slope,         produce: geom, suffix: _slope,           zh: 斜坡,   en: " Slope"}
- {id: triangle_wall, produce: geom, suffix: _triangle_wall,   zh: 三角墙, en: " Triangle Wall"}

special:
- {id: window_frame,        produce: special, kit: static, zh: 窗框,       en: Window Frame}
- {id: window_frame_cross,  produce: special, kit: static, zh: 十字窗框,   en: Cross Window Frame}
- {id: window_frame_corner, produce: special, kit: static, zh: 转角窗框,   en: Corner Window Frame}
- {id: window_panel,        produce: special, kit: static, zh: 窗扇,       en: Window Panel}
- {id: grille_panel,        produce: special, kit: static, zh: 防盗网,     en: Security Grille Panel}
- {id: grille_cap,          produce: special, kit: static, zh: 防盗网帽,   en: Security Grille Cap}
- {id: grille_arch,         produce: special, kit: static, zh: 拱形防盗网, en: Security Grille Arch}
- {id: grille_cage,         produce: special, kit: static, zh: 笼式防盗网, en: Security Grille Cage}
- {id: grille_box,          produce: special, kit: static, zh: 环框防盗笼, en: Security Grille Box}
- {id: pole,                produce: special, kit: pole,   zh: 杆,         en: Pole}
- {id: pole_arm,            produce: special, kit: static, zh: 横担,       en: Pole Arm}
- {id: pole_base,           produce: special, kit: static, zh: 杆基,       en: Pole Base}
- {id: wire,                produce: special, kit: static, zh: 电线,       en: Wire}
